services:
  # -------------- PostgreSQL --------------
  postgres:
    image: postgres:16-alpine
    container_name: ralphguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ralphguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ralphguard_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ralphguard}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ralphguard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------- Redis --------------
  redis:
    image: redis:7-alpine
    container_name: ralphguard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------- Backend API --------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ralphguard-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ralphguard}:${POSTGRES_PASSWORD:-ralphguard_dev}@postgres:5432/${POSTGRES_DB:-ralphguard}
      REDIS_URL: redis://redis:6379/0
      API_SECRET_KEY: ${API_SECRET_KEY:-dev-secret-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # -------------- Scientific Worker --------------
  worker:
    build:
      context: ./scientific
      dockerfile: Dockerfile
    container_name: ralphguard-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ralphguard}:${POSTGRES_PASSWORD:-ralphguard_dev}@postgres:5432/${POSTGRES_DB:-ralphguard}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./scientific:/app
      - ./data:/data
    command: python worker.py

  # -------------- Frontend --------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ralphguard-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres-data:
  redis-data:
